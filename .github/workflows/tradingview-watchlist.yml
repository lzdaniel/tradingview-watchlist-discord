name: TradingView Watchlist Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode"
        required: true
        default: "always"
        type: choice
        options:
          - always
          - market
          - offhours
  schedule:
    # Open/close full-list snapshots. GitHub cron is UTC; both UTC hours are listed so
    # Python can pick the one that matches America/New_York in DST or standard time.
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "0 21 * * 1-5"
    # Market scanner: every 15 minutes around possible US regular hours.
    # Python checks America/New_York and only scans during 09:30-16:00.
    - cron: "5,20,35,50 13-21 * * 1-5"
    # Off-hours scanner: wakes hourly. Python skips regular market hours;
    # outside regular hours it sends only added/removed changes, except the
    # close full-list fallback window.
    - cron: "5 * * * *"

permissions:
  contents: write

concurrency:
  group: tradingview-watchlist-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NOTIFIERS: ${{ vars.NOTIFIERS || 'discord' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_DISABLE_WEB_PAGE_PREVIEW: ${{ vars.TELEGRAM_DISABLE_WEB_PAGE_PREVIEW || 'false' }}
      WATCHLIST_NAME: ${{ vars.WATCHLIST_NAME || 'TradingView Watchlist' }}
      WATCHLIST_URL: ${{ vars.WATCHLIST_URL }}
      STATE_FILE: ${{ vars.STATE_FILE || 'state/watchlist.json' }}
      MARKET_TIMEZONE: ${{ vars.MARKET_TIMEZONE || 'America/New_York' }}
      MARKET_OPEN: ${{ vars.MARKET_OPEN || '09:30' }}
      MARKET_CLOSE: ${{ vars.MARKET_CLOSE || '16:00' }}
      SNAPSHOT_HOURS: ""
      SNAPSHOT_WINDOW_MINUTES: ${{ vars.SNAPSHOT_WINDOW_MINUTES || '45' }}
      HEADLESS: "true"
      SEND_INITIAL_BASELINE: "false"
      PERSIST_LAST_SEEN: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright Chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m playwright install --with-deps chromium

      - name: Select schedule mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 13 * * 1-5" || "${{ github.event.schedule }}" == "30 14 * * 1-5" ]]; then
            echo "mode=full-open" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 20 * * 1-5" || "${{ github.event.schedule }}" == "0 21 * * 1-5" ]]; then
            echo "mode=full-close" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "5,20,35,50 13-21 * * 1-5" ]]; then
            echo "mode=market" >> "$GITHUB_OUTPUT"
          else
            echo "mode=offhours" >> "$GITHUB_OUTPUT"
          fi

      - name: Run watcher
        shell: bash
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            full-open)
              python -m tv_watchlist_monitor.watcher run-triggered-full --label open --schedule "${{ github.event.schedule }}"
              ;;
            full-close)
              python -m tv_watchlist_monitor.watcher run-triggered-full --label close --schedule "${{ github.event.schedule }}"
              ;;
            *)
              python -m tv_watchlist_monitor.watcher run-scheduled --mode "${{ steps.mode.outputs.mode }}"
              ;;
          esac

      - name: Commit state changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -e "$STATE_FILE" ]]; then
            git add "$STATE_FILE"
          else
            echo "State file does not exist yet: $STATE_FILE"
          fi
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update TradingView watchlist state"
            git push
          fi
